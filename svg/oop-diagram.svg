  <rect x="588" y="250" width="170" height="50" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <!-- re-positioned as 5th -->
  <rect x="480" y="250" width="176" height="50" rx="8" fill="#2d5014" stroke="#86efac" stroke-width="2"/>
