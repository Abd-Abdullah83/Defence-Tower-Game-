<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0d0d2e"/>
    </linearGradient>
    <linearGradient id="entityG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="enemyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/><stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="towerG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/><stop offset="100%" stop-color="#15803d"/>
