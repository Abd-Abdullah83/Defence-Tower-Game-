  <text x="583" y="358" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#bbf7d0">Dmg 20 · RoF ×5</text>

  <rect x="668" y="318" width="150" height="50" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="743" y="340" text-anchor="middle" font-family="'Trebuchet MS',Arial" font-size="12" font-weight="bold" fill="#86efac">SlowTower</text>
