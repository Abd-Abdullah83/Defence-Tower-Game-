  <line x1="720" y1="188" x2="743" y2="250" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aGreen)"/>
  <line x1="650" y1="188" x2="583" y2="318" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aGreen)"/>
  <line x1="730" y1="188" x2="743" y2="318" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aGreen)"/>

