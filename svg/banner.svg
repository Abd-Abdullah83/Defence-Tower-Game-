<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0d0d2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88"/>
      <stop offset="70%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="740" y1="0" x2="740" y2="200"/>
    <line x1="820" y1="0" x2="820" y2="200"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="100" r="80" fill="#00ff88" opacity="0.04"/>
  <circle cx="700" cy="100" r="80" fill="#ff6b35" opacity="0.04"/>

  <!-- Tower icons left -->
  <rect x="22" y="44" width="28" height="28" rx="4" fill="#c05038" opacity="0.9"/>
  <rect x="36" y="54" width="20" height="5" rx="2" fill="#1a0a0a"/>
  <rect x="22" y="80" width="22" height="28" rx="4" fill="#3cb4dc" opacity="0.9"/>
  <rect x="44" y="91" width="20" height="4" rx="2" fill="#0a1a0a"/>
  <rect x="22" y="116" width="28" height="28" rx="4" fill="#a073b4" opacity="0.9"/>
  <rect x="50" y="126" width="18" height="4" rx="2" fill="#1a0a1a"/>
  <rect x="22" y="152" width="28" height="28" rx="4" fill="#3c64b4" opacity="0.9"/>

  <!-- Enemy circles right -->
  <circle cx="848" cy="56" r="14" fill="#dc2626" opacity="0.9"/>
  <circle cx="848" cy="94" r="11" fill="#023232" opacity="0.9"/>
  <circle cx="848" cy="132" r="16" fill="#4e3c05" opacity="0.9"/>
  <circle cx="848" cy="168" r="12" fill="#4646dc" opacity="0.9"/>
  <circle cx="848" cy="168" r="18" fill="none" stroke="#6464ff" stroke-width="2" opacity="0.5"/>

  <!-- Main Title -->
  <text x="450" y="98" text-anchor="middle"
        font-family="'Trebuchet MS', 'Arial Black', sans-serif"
        font-size="58" font-weight="900" letter-spacing="4"
        fill="url(#titleGrad)" filter="url(#glow)">TOWER DEFENSE</text>

  <!-- Subtitle line -->
  <text x="450" y="130" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="14" fill="#4a5568" letter-spacing="6">C++  ·  SFML  ·  OOP  ·  POLYMORPHISM</text>

  <!-- Tagline -->
  <text x="450" y="168" text-anchor="middle"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="13" fill="#00ff88" letter-spacing="2" opacity="0.9">⚔  DEFEND YOUR BASE  ·  PLACE TOWERS  ·  SURVIVE 5 WAVES  ⚔</text>

  <!-- Top border line -->
  <line x1="0" y1="3" x2="900" y2="3" stroke="url(#borderGrad)" stroke-width="2"/>
  <!-- Bottom border line -->
  <line x1="0" y1="197" x2="900" y2="197" stroke="url(#borderGrad)" stroke-width="2"/>
</svg>
